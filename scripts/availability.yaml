issues:
  - title: 基本的な可用性設定
    body: |
      # 本Issueでやること
      **本issueは内容を確認したらクローズしてください。**

      K8sのワークロードに対する基本的な可用性設定としては以下の3つがあります。
      - Service を使った負荷分散
      - Workload リソースを使ったPod作成
      - restartPolicy を使ったPodの再起動
      
      これらについて解説します。

      ## Service を使った負荷分散
      Serviceを使うことで、PodのIPアドレスが変わっても、ServiceのIPアドレスを通じてアクセスできるようになります。これにより、Podの再起動やスケールアウト/スケールイン時でも、クライアントは常に同じServiceのIPアドレスを使用できます。

      ## Workload リソースを使ったPod作成
      Workloadリソース（DeploymentやStatefulSetなど）を使うことで、Podのレプリカ数を指定し、複数のPodを同時に稼働させることができます。これにより、1つのPodが障害で停止しても、他のPodがトラフィックを処理できるため、アプリケーションの可用性が向上します。基本的にレプリカ数は2以上に設定します。

      ## restartPolicy を使ったPodの再起動
      Podの`restartPolicy`を`Always`に設定することで、Podが異常終了した場合に自動的に再起動されます。これにより、Podが障害で停止しても、Kubernetesが自動的にPodを再起動し、アプリケーションの可用性を維持します。
      
      > restartPolicyは`Always`以外に`OnFailure`や`Never`もありますが、Jobで作成するPod向けの設定です。可用性を重視する場合はデフォルトの`Always`を使用します。
      
  - title: Podにヘルスチェックを設定する（probe）
    body: |
      # 本Issueでやること
      Podにヘルスチェックを設定することで、Podの状態を監視し、異常が発生した場合に自動的に再起動や再スケジュールを行うことができます。これにより、アプリケーションの可用性が向上します。
      Podのヘルスチェック機能には3種類あります。

      - Liveness Probe: Podが正常に動作しているかを確認し、異常があれば再起動します。
      - Readiness Probe: Podがトラフィックを受け付ける準備ができているかを確認し、準備ができていない場合はトラフィックを受け付けません。
      - Startup Probe: Podの起動が完了したかを確認し、起動中のPodに対してはLivenessやReadinessのチェックを行いません。

      # プラクティス
      - フロントエンドおよびバックエンドのPodにLivenessおよびReadiness Probeを設定する (既存の`deployment.yaml`を修正する) ([参考：Configure Liveness, Readiness and Startup Probes](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/))
        - typeは`httpGet`
        - pathは以下の通り
          - フロントエンド: `/`
          - バックエンド: `/api/message`
        - portはコンテナの待ち受けポートを指定する
        - 監視間隔は何秒でもいいが、失敗する順番は readiness -> liveness にすること
          - こうすることでまずServiceのトラフィックを受け付けないようにし、次にPodを再起動することができる

      # 参考
      - [Podのライフサイクル](https://kubernetes.io/ja/docs/concepts/workloads/pods/pod-lifecycle/)

      # 確認
      - 以下コマンドを実行し、設定が反映されたこと
        ```
        kubectl get deploy frontend -o yaml
        kubectl get deploy backend  -o yaml
        ```
      - 以下コマンドを実行し、liveness probeが効いてpod再起動すること。「RESTARTS:1」になること
        - frontend
        ```
        FRONT_POD=$(kubectl get pod -l app=frontend -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -it "$FRONT_POD" -- sh -c 'kill 1'
        kubectl get pod -l app=frontend
        kubectl describe pod "$FRONT_POD" | sed -n '/Events:/,$p'
        ```

        - backend
        ```
        BACK_POD=$(kubectl get pod -l app=backend -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -it "$BACK_POD" -- sh -c 'kill 1'
        kubectl get pod -l app=backend
        kubectl describe pod "$BACK_POD" | sed -n '/Events:/,$p'
        ```

        想定結果例
        ```
        tie304119@S2504C10442-T1:~/cloudnative-practice/cloudnative-practice/codes/frontend/k8s$ kubectl describe pod "$FRONT_POD" | sed -n '/Events:/,$p'
        Events:
          Type    Reason     Age                  From               Message
          ----    ------     ----                 ----               -------
          Normal  Scheduled  9m50s                default-scheduler  Successfully assigned default/frontend-6665699b77-pql5l to i-0cdd1deb45a62afa1
          Normal  Pulled     56s (x2 over 9m44s)  kubelet            spec.containers{frontend}: Container image "456247443832.dkr.ecr.ap-northeast-1.amazonaws.com/frontend:v2" already present on machine and can be accessed by the pod
          Normal  Created    56s (x2 over 9m44s)  kubelet            spec.containers{frontend}: Container created
          Normal  Started    56s (x2 over 9m44s)  kubelet            spec.containers{frontend}: Container started
        tie304119@S2504C10442-T1:~/cloudnative-practice/cloudnative-practice/codes/frontend/k8s$ 
        tie304119@S2504C10442-T1:~/cloudnative-practice/cloudnative-practice/codes/frontend/k8s$ kubectl get pod -l app=frontend
        NAME                        READY   STATUS    RESTARTS        AGE
        frontend-6665699b77-pql5l   1/1     Running   1 (4m30s ago)   13m
        tie304119@S2504C10442-T1:~/cloudnative-practice/cloudnative-practice/codes/frontend/k8s$ 
        ```

  - title: Podにgracefulshutdownを設定する
    body: |
      # 本Issueでやること
      Pod終了時のリクエストロスを防ぐため、graceful shutdownを設定します。

      ## gracefulshutdownとは？
      
      アプリケーションのPodが停止する際に、安全に終了するための仕組みです。
      
      ## なぜ必要なのか？
      
      Podを停止する際、以下の2つの処理が**同時に**実行されます：
      1. Podの停止処理
      2. ServiceからそのPodを除外する処理
      
      この2つの処理が同時に行われるため、「Podは停止中だが、まだServiceからトラフィックが送られてくる」という状況が発生します。これにより、ユーザーのリクエストが失敗してしまいます。
      
      ## どうやって解決するか？
      
      gracefulshutdownを設定することで、以下の順序で安全に停止できます：
      
      1. **preStop処理**：Podが停止する前に、Serviceからの除外を待つため少し待機（Sleep）します
      2. **terminationGracePeriodSeconds**：Podが完全に停止するまでの猶予時間を設定します
      
      ### 具体的な流れ
      
      1. Podに停止指示が出される
      2. **preStop処理が実行**：数秒待機して、Serviceからの除外を待つ
      3. **SIGTERMシグナル送信**：アプリケーションに「終了準備をしてください」という合図
      4. **アプリケーションの終了処理**：現在処理中のリクエストを完了させる
      5. **猶予期間終了**：設定した時間内に終了しない場合は強制終了
      
      ### 設定値の目安
      
      - **preStop処理**：5-10秒程度の待機
      - **terminationGracePeriodSeconds**：30秒程度（preStop時間 + アプリケーション終了時間）

      # プラクティス
      - フロントエンドおよびバックエンドのPodにgracefulshutdownを設定する (既存の`deployment.yaml`を修正する)
        - `terminationGracePeriodSeconds`を設定して、Podが停止するまでの猶予時間を設定する
        - `preStop`フックを設定して、Serviceからの除外を待つためにSleepさせる

      # 参考
      - [参考：コンテナライフサイクルフック](https://kubernetes.io/ja/docs/concepts/containers/container-lifecycle-hooks/)

      # 確認
      - 以下コマンドを実行し、設定が反映されたこと
      ```
      kubectl get deploy frontend -o yaml | grep -E "terminationGracePeriodSeconds|preStop" -n
      kubectl get deploy backend -o yaml | grep -E "terminationGracePeriodSeconds|preStop" -n
      ```

  - title: Podにaffinityを設定する
    body: |
      # 本Issueでやること
      Podのaffinityを設定することで、どのノードにPodを配置するかを制御し、可用性やパフォーマンスを向上させます。
      
      ## affinityの種類
      
      - **nodeAffinity**: Podを配置する先のノードを指定する
      - **podAffinity**: 特定のPodと同じノードにPodを配置する
      - **podAntiAffinity**: 特定のPodと異なるノードにPodを配置する
      
      ## 設定レベル
      
      - **requiredDuringSchedulingIgnoredDuringExecution**: 必須条件（Hard制約）
      - **preferredDuringSchedulingIgnoredDuringExecution**: 優先条件（Soft制約）
      
      ## 実践的な使用例
      
      - **高可用性のための分散配置**: 同じアプリケーションのPodを異なるノードに配置
      - **通信効率のための集約配置**: 連携するアプリケーション同士を同じノードに配置
      - **リソース効率化**: 特定のハードウェアリソースを持つノードにPodを配置
      
      # プラクティス
      - フロントエンドとバックエンドのDeploymentにaffinityを設定する (既存の`deployment.yaml`を修正) ([Assigning Pods to Nodes](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/))
        - **フロントエンドのPod同士**: 異なるノードに分散配置（podAntiAffinity）
        - **バックエンドのPod同士**: 異なるノードに分散配置（podAntiAffinity）
        - **フロントエンドとバックエンド**: 同じノードに配置（podAffinity）
        - labelSelectorは各アプリケーションの`app`ラベルを使用する

      # 確認
      - 以下コマンドを実行し、想定通りのPod配置になっていることを確認する。
      ```
      kubectl get pods -o wide -l app=frontend
      kubectl get pods -o wide -l app=backend
      ```

      想定結果
      ```
      tie304119@S2504C10442-T1:~/cloudnative-practice/cloudnative-practice/codes$ kubectl get pods -o wide -l app=backend
      NAME                       READY   STATUS    RESTARTS   AGE    IP             NODE                  NOMINATED NODE   READINESS GATES
      backend-7844588548-lf8hk   1/1     Running   0          50s    10.0.1.113     i-0cdd1deb45a62afa1   <none>           <none>
      backend-7844588548-wkf8n   1/1     Running   0          2m1s   10.0.102.146   i-045338225f54996ad   <none>           <none>
      tie304119@S2504C10442-T1:~/cloudnative-practice/cloudnative-practice/codes$ kubectl get pods -o wide -l app=frontend
      NAME                        READY   STATUS    RESTARTS   AGE     IP             NODE                  NOMINATED NODE   READINESS GATES
      frontend-5d97674795-84rdx   1/1     Running   0          8m56s   10.0.1.125     i-0cdd1deb45a62afa1   <none>           <none>
      frontend-5d97674795-zfvmg   1/1     Running   0          9m55s   10.0.102.145   i-045338225f54996ad   <none>           <none>
