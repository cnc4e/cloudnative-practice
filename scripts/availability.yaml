  - title: PodDisruptionBudget（PDB）を設定する
    body: |
      # 本Issueでやること
      PodDisruptionBudget（PDB）は、計画的なメンテナンス（ノードのアップグレードなど）中に同時に停止できるPodの数を制限することで、アプリケーションの可用性を保証します。

      ## PDBの重要性

      Kubernetesクラスターでは、以下のような計画的なメンテナンスが発生します：
      - ノードのアップグレード
      - クラスターのスケーリング
      - ノードの再起動

      PDBを設定することで、これらのメンテナンス中でも最低限必要なPod数を維持し、サービスの継続性を保証できます。
      特に EKS Auto Mode では、ノードが最大21日で自動的に入れ替えられます。
      この際、ノード上のPodは強制的に別ノードへ移動されます。
      PDBが設定されていない場合、複数のPodが同時に停止してしまう可能性があるため、PDBの設定が非常に重要です。

      ## PDBの設定項目

      - **minAvailable**: 最低限維持する必要があるPod数（数値または割合）
      - **maxUnavailable**: 同時に停止できる最大Pod数（数値または割合）
      - **selector**: 対象となるPodを選択するためのラベルセレクター

      ## 設定の考え方

      - **単一Pod構成**: `minAvailable: 1` で最低1つのPodを維持
      - **複数Pod構成**: `minAvailable: 50%` で半数以上のPodを維持
      - **高可用性要求**: より厳しい条件を設定

      # プラクティス
      - フロントエンドおよびバックエンドにPodDisruptionBudget（PDB）を設定する (`pdb.yaml`を新規作成) ([アプリケーションにDisruption Budget指定する](https://kubernetes.io/ja/docs/tasks/run-application/configure-pdb/))
        - 最低1つのPodを常に稼働状態にする

      # 確認
      - `kubectl get pdb`コマンドを実行し、`MIN AVAILABLE`が`1`であることを確認する。
      ```
      tie304119@S2504C10442-T1:~/cloudnative-practice/cloudnative-practice/codes/frontend/k8s$ kubectl get pdb
      NAME           MIN AVAILABLE   MAX UNAVAILABLE   ALLOWED DISRUPTIONS   AGE
      backend-pdb    1               N/A               1                     57s
      frontend-pdb   1               N/A               1                     62s
      tie304119@S2504C10442-T1:~/cloudnative-practice/cloudnative-practice/codes/frontend/k8s$ 
      ```

  - title: DeploymentのUpdate Strategyを設定する
    body: |
      # 本Issueでやること
      DeploymentのUpdate Strategyは、Podを更新する際の方法を制御します。適切なUpdate Strategyを設定することで、ダウンタイムを最小限に抑えながら安全にアプリケーションを更新できます。

      ## Update Strategyの種類

      - **RollingUpdate** (デフォルト): 古いPodを段階的に新しいPodに置き換える
      - **Recreate**: 全ての古いPodを停止してから新しいPodを作成する

      ## RollingUpdateの設定項目

      - **maxUnavailable**: 更新中に同時に停止できる最大Pod数（数値または割合）
      - **maxSurge**: 更新中に追加で作成できる最大Pod数（数値または割合）

      ## 設定の考え方

      - **ゼロダウンタイム更新**: `maxUnavailable: 0, maxSurge: 1` の場合
        - 新Podを1つ追加⇒古いPodを1つ削除⇒新Podを1つ追加⇒…　これを繰り返す

      - **高速更新**: `maxUnavailable: 50%, maxSurge: 50%` の場合
        - (Pod4つの場合) 新Podを2つ追加＆古いPodを2つ削除⇒新Podを2つ追加＆古いPodを2つ削除

      - **リソース節約**: `maxSurge: 0, maxUnavailable: 1` の場合
        - 古いPodを1つ削除⇒新Podを1つ追加⇒古いPodを1つ削除⇒新Podを1つ追加⇒…　これを繰り返す

      ## 実践的な例

      ```yaml
      spec:
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 0
            maxSurge: 1
      ```

      この設定により、更新中も常に最低限のPodが稼働し、ダウンタイムを回避できます。

      ## PodDisruptionBudget（PDB）との関係

      PodDisruptionBudget（PDB）と、DeploymentのUpdate StrategyはどちらもPodの停止数を制御する設定ですが目的が異なります。PDBは計画的なメンテナンス時にPodの同時停止数を制限し、Update Strategyはアプリケーション更新時のPod置き換え方法を制御します。

      Update StrategyとPDBは補完的に動作します：
      - **Update Strategy**: アプリケーション更新時のPod置き換えを制御
      - **PDB**: クラスターメンテナンス時のPod停止を制限

      両方を設定することで、様々なシナリオでの可用性を保証できます：
      - アプリケーション更新時: Update Strategyが適用
      - ノードメンテナンス時: PDBが適用

      # プラクティス
      - フロントエンドおよびバックエンドのDeploymentにRollingUpdate Strategyを設定する (既存の`deployment.yaml`を修正) ([更新戦略](https://kubernetes.io/ja/docs/concepts/workloads/controllers/deployment/#%E6%9B%B4%E6%96%B0%E6%88%A6%E7%95%A5))
        - ゼロダウンタイムでの更新を実現するため`maxUnavailable: 0`、`maxSurge: 1`を設定する

      # 確認
      - `code/frontend/k8s/deployment.yaml`, `code/backend/k8s/deployment.yaml`を更新してapplyし、以下コマンドを実行する。
        更新中にPod数が設定した値を下回らないことを確認する。
      ```
      kubectl get pods -l app=frontend -w
      kubectl get pods -l app=backend -w
      ```
