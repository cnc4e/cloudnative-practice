      # 確認
      - Issue`バックエンドのコンテナをビルドしてECRにプッシュするワークフローを作成する`でビルドしたイメージが、ImageUpdaterにより更新と検知され、Deploymentの更新が行われることを確認する

  - title: アプリケーションの更新からDeploymentの更新まで一気通貫で確認する
    body: |
      # 本Issueでやること
      アプリケーション更新 > GitHub Actions (イメージビルド&プッシュ) > Argo CD ImageUpdater (イメージ更新) > Argo CD (マニフェストデプロイ) まで一気通貫で確認する。

      # 前提
      - フロントエンドのイメージを自動更新する
      - バックエンドのイメージを自動更新する

      # 作業手順
      - フロントエンドまたはバックエンドのアプリケーションコードを更新し、GitHubにpushする。
        - `codes/frontend/app`配下に任意のファイルを作成するでも良い
      - しばらく(10分程)待ち、以下の動作が実行されることを確認する
        - GitHub Actionsが実行され、イメージがビルドされてECRにプッシュされることを確認する
        - Argo CD ImageUpdater がイメージの更新を検知し、K8sマニフェストを更新することを確認する
        - Argo CD がマニフェストの更新を検知し、Deployment が更新されることを確認する
        - `kubectl logs -n argocd deployment/argocd-image-updater-controller --tail=30`コマンドを実行し`images_updated=1 errors=0`となること。
          ログ出力例
          ```
          time="2026-03-03T23:28:08Z" level=info msg="Processing results: applications=1 images_considered=1 images_skipped=0 images_updated=1 errors=0" controller=imageupdater controllerGroup=argocd-image-updater.argoproj.io controllerKind=ImageUpdater imageUpdater_name=backend-image-updater imageUpdater_namespace=argocd logger=reconcile
          ```

      # 参考
      - Argo CD のデフォルトの同期間隔は最大3分です。[Automated Sync Policy](https://argo-cd.readthedocs.io/en/stable/user-guide/auto_sync/#automated-sync-semantics)
      - Image Updater のデフォルトの同期間隔は2分です。[Configuration and command line reference](https://argocd-image-updater.readthedocs.io/en/stable/install/reference/)
