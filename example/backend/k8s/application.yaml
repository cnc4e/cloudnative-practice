apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./example/backend/k8s
    repoURL: https://github.com/moriryota62/cloudnative-practice
    targetRevision: main
    kustomize: {}
  syncPolicy:
    automated: {}
