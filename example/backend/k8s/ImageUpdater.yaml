apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: backend-image-updater
  namespace: argocd
spec:
  namespace: argocd
  writeBackConfig:
    method: "git"
    gitConfig:
      repository: "https://github.com/skwt20/cloudnative-practice"
      branch: "main"
      writeBackTarget: "kustomize"
  applicationRefs:
    - namePattern: "backend"
      images:
        - alias: "backend"
          imageName: "456247443832.dkr.ecr.ap-northeast-1.amazonaws.com/backend"
          commonUpdateSettings:
            updateStrategy: "newest-build"